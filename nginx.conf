# Nginx Configuration for HP Bingo Platform
# Handles HTTP routing to Django and WebSocket routing to Tornado

# Define upstream servers
upstream django_app {
    server django:8000;
}

upstream tornado_ws {
    server tornado:8888;
}

# HTTP Server Configuration
server {
    listen 80;
    server_name _;
    
    # Client body size limit (for file uploads)
    client_max_body_size 10M;
    
    # Redirect to HTTPS in production (commented for development)
    # Uncomment the following line for production with SSL
    # return 301 https://$host$request_uri;
    
    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    
    # Static files served by Nginx
    location /static/ {
        alias /static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Media files served by Nginx
    location /media/ {
        alias /media/;
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # WebSocket connections routed to Tornado
    location /websocket/ {
        proxy_pass http://tornado_ws;
        proxy_http_version 1.1;
        
        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeout (24 hours)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        
        # Disable buffering for WebSocket
        proxy_buffering off;
    }
    
    # All other HTTP traffic routed to Django
    location / {
        proxy_pass http://django_app;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}

