version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bingosync-postgres
    environment:
      POSTGRES_DB: bingosync
      POSTGRES_USER: bingosync
      POSTGRES_PASSWORD: bingosync_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bingosync"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bingosync-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  django:
    build:
      context: ./bingosync-app
      dockerfile: Dockerfile.dev
    container_name: bingosync-django
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./bingosync-app:/app
      - ./requirements.txt:/app/requirements.txt
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true

  websocket:
    build:
      context: ./bingosync-websocket
      dockerfile: Dockerfile.dev
    container_name: bingosync-websocket
    command: python app.py
    volumes:
      - ./bingosync-websocket:/app
    ports:
      - "8888:8888"
    env_file:
      - .env
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
